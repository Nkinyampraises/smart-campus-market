services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: campustrade
      POSTGRES_PASSWORD: campustrade_pass
      POSTGRES_DB: campustrade
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campustrade"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Microservices ─────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
        PORT: 3000
        NPM_CONFIG_STRICT_SSL: ${NPM_CONFIG_STRICT_SSL:-true}
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-campustrade_secret}
      FRONTEND_URL: http://localhost:5173
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      LISTING_SERVICE_URL: http://listing-service:3003
      CHAT_SERVICE_URL: http://chat-service:3004
      ADMIN_SERVICE_URL: http://admin-service:3005
      AI_SERVICE_URL: http://ai-service:3006
      SEARCH_SERVICE_URL: http://search-service:3007
      NOTIFICATION_SERVICE_URL: http://notification-service:3008
    depends_on:
      - auth-service
      - listing-service
      - user-service

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
        PORT: 3001
        NPM_CONFIG_STRICT_SSL: ${NPM_CONFIG_STRICT_SSL:-true}
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      SERVICE_NAME: auth-service
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: campustrade
      DB_PASSWORD: campustrade_pass
      DB_NAME: campustrade
      JWT_SECRET: ${JWT_SECRET:-campustrade_secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-81640689481-v4fppdfndv88nee0f1kh23civ41ik16p.apps.googleusercontent.com}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
        PORT: 3002
        NPM_CONFIG_STRICT_SSL: ${NPM_CONFIG_STRICT_SSL:-true}
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      SERVICE_NAME: user-service
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: campustrade
      DB_PASSWORD: campustrade_pass
      DB_NAME: campustrade
      JWT_SECRET: ${JWT_SECRET:-campustrade_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  listing-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: listing-service
        PORT: 3003
        NPM_CONFIG_STRICT_SSL: ${NPM_CONFIG_STRICT_SSL:-true}
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      SERVICE_NAME: listing-service
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: campustrade
      DB_PASSWORD: campustrade_pass
      DB_NAME: campustrade
      JWT_SECRET: ${JWT_SECRET:-campustrade_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  chat-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: chat-service
        PORT: 3004
        NPM_CONFIG_STRICT_SSL: ${NPM_CONFIG_STRICT_SSL:-true}
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      SERVICE_NAME: chat-service
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: campustrade
      DB_PASSWORD: campustrade_pass
      DB_NAME: campustrade
      JWT_SECRET: ${JWT_SECRET:-campustrade_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: admin-service
        PORT: 3005
        NPM_CONFIG_STRICT_SSL: ${NPM_CONFIG_STRICT_SSL:-true}
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      SERVICE_NAME: admin-service
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: campustrade
      DB_PASSWORD: campustrade_pass
      DB_NAME: campustrade
      JWT_SECRET: ${JWT_SECRET:-campustrade_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ai-service
        PORT: 3006
        NPM_CONFIG_STRICT_SSL: ${NPM_CONFIG_STRICT_SSL:-true}
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      SERVICE_NAME: ai-service
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: campustrade
      DB_PASSWORD: campustrade_pass
      DB_NAME: campustrade
      JWT_SECRET: ${JWT_SECRET:-campustrade_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  search-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: search-service
        PORT: 3007
        NPM_CONFIG_STRICT_SSL: ${NPM_CONFIG_STRICT_SSL:-true}
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      SERVICE_NAME: search-service
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: campustrade
      DB_PASSWORD: campustrade_pass
      DB_NAME: campustrade
      JWT_SECRET: ${JWT_SECRET:-campustrade_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
        PORT: 3008
        NPM_CONFIG_STRICT_SSL: ${NPM_CONFIG_STRICT_SSL:-true}
    restart: unless-stopped
    ports:
      - "3008:3008"
    environment:
      PORT: 3008
      SERVICE_NAME: notification-service
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: campustrade
      DB_PASSWORD: campustrade_pass
      DB_NAME: campustrade
      JWT_SECRET: ${JWT_SECRET:-campustrade_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@campustrade.cm}
      FRONTEND_URL: http://localhost:5173
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-mailto:admin@example.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-81640689481-v4fppdfndv88nee0f1kh23civ41ik16p.apps.googleusercontent.com}
    restart: unless-stopped
    ports:
      - "5173:80"

  # ── Monitoring ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.12.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($$|/)
    volumes:
      - /:/host:ro,rslave
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:13.0.2
    restart: unless-stopped
    ports:
      - "3009:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin}

  # ── Nginx Gateway (Production) ────────────────────────────────────────────

  nginx:
    image: nginx:1.30.3-alpine3.23
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
      - frontend

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
