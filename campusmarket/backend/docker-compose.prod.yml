version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
        PORT: 3000
    restart: unless-stopped
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      LISTING_SERVICE_URL: http://listing-service:3003
      CHAT_SERVICE_URL: http://chat-service:3004
      ADMIN_SERVICE_URL: http://admin-service:3005
      AI_SERVICE_URL: http://ai-service:3006
      SEARCH_SERVICE_URL: http://search-service:3007
      NOTIFICATION_SERVICE_URL: http://notification-service:3008
    depends_on:
      auth-service: { condition: service_healthy }
      user-service: { condition: service_healthy }
      listing-service: { condition: service_healthy }
      chat-service: { condition: service_healthy }
      admin-service: { condition: service_healthy }
      ai-service: { condition: service_healthy }
      search-service: { condition: service_healthy }
      notification-service: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args: { SERVICE_NAME: auth-service, PORT: 3001 }
    restart: unless-stopped
    environment: &svc_env
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args: { SERVICE_NAME: user-service, PORT: 3002 }
    restart: unless-stopped
    environment:
      <<: *svc_env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  listing-service:
    build:
      context: .
      dockerfile: Dockerfile
      args: { SERVICE_NAME: listing-service, PORT: 3003 }
    restart: unless-stopped
    environment:
      <<: *svc_env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  chat-service:
    build:
      context: .
      dockerfile: Dockerfile
      args: { SERVICE_NAME: chat-service, PORT: 3004 }
    restart: unless-stopped
    environment:
      <<: *svc_env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  admin-service:
    build:
      context: .
      dockerfile: Dockerfile
      args: { SERVICE_NAME: admin-service, PORT: 3005 }
    restart: unless-stopped
    environment:
      <<: *svc_env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3005/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
      args: { SERVICE_NAME: ai-service, PORT: 3006 }
    restart: unless-stopped
    environment:
      <<: *svc_env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3006/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  search-service:
    build:
      context: .
      dockerfile: Dockerfile
      args: { SERVICE_NAME: search-service, PORT: 3007 }
    restart: unless-stopped
    environment:
      <<: *svc_env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3007/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args: { SERVICE_NAME: notification-service, PORT: 3008 }
    restart: unless-stopped
    environment:
      <<: *svc_env
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FROM_EMAIL: ${FROM_EMAIL}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3008/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-gateway: { condition: service_healthy }

volumes:
  postgres_data:
  redis_data:
