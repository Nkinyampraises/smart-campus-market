# Prometheus + Grafana monitoring stack for Kubernetes

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: campustrade
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'api-gateway'
        static_configs:
          - targets: ['api-gateway:3000']
        metrics_path: /metrics
      - job_name: 'auth-service'
        static_configs:
          - targets: ['auth-service:3001']
        metrics_path: /metrics
      - job_name: 'user-service'
        static_configs:
          - targets: ['user-service:3002']
        metrics_path: /metrics
      - job_name: 'listing-service'
        static_configs:
          - targets: ['listing-service:3003']
        metrics_path: /metrics
      - job_name: 'chat-service'
        static_configs:
          - targets: ['chat-service:3004']
        metrics_path: /metrics
      - job_name: 'admin-service'
        static_configs:
          - targets: ['admin-service:3005']
        metrics_path: /metrics
      - job_name: 'ai-service'
        static_configs:
          - targets: ['ai-service:3006']
        metrics_path: /metrics
      - job_name: 'search-service'
        static_configs:
          - targets: ['search-service:3007']
        metrics_path: /metrics
      - job_name: 'notification-service'
        static_configs:
          - targets: ['notification-service:3008']
        metrics_path: /metrics
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: campustrade
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: campustrade
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: campustrade
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: campustrade123
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: campustrade
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
