apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: campustrade
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: campustrade/notification-service:latest
          ports:
            - containerPort: 3008
          envFrom:
            - configMapRef:
                name: campustrade-config
          env:
            - name: PORT
              value: "3008"
            - name: SERVICE_NAME
              value: "notification-service"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: campustrade-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campustrade-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: campustrade-secrets
                  key: JWT_SECRET
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: campustrade-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: campustrade-secrets
                  key: SMTP_PASS
          livenessProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: campustrade
spec:
  selector:
    app: notification-service
  ports:
    - port: 3008
      targetPort: 3008
  type: ClusterIP
