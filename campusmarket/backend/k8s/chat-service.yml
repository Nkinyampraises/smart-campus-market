apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: campustrade
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
        - name: chat-service
          image: campustrade/chat-service:latest
          ports:
            - containerPort: 3004
          envFrom:
            - configMapRef:
                name: campustrade-config
          env:
            - name: PORT
              value: "3004"
            - name: SERVICE_NAME
              value: "chat-service"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: campustrade-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campustrade-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: campustrade-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: campustrade
spec:
  selector:
    app: chat-service
  ports:
    - port: 3004
      targetPort: 3004
  type: ClusterIP
