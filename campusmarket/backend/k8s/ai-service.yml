apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: campustrade
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: campustrade/ai-service:latest
          ports:
            - containerPort: 3006
          envFrom:
            - configMapRef:
                name: campustrade-config
          env:
            - name: PORT
              value: "3006"
            - name: SERVICE_NAME
              value: "ai-service"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: campustrade-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campustrade-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: campustrade-secrets
                  key: JWT_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: campustrade-secrets
                  key: ANTHROPIC_API_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: campustrade
spec:
  selector:
    app: ai-service
  ports:
    - port: 3006
      targetPort: 3006
  type: ClusterIP
