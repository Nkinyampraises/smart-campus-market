---
- name: Install CampusTrade Server Dependencies
  hosts: campustrade_servers
  become: yes
  vars:
    node_version: "20"
    docker_compose_version: "2.24.0"

  tasks:

    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
          - ufw
          - nginx
          - postgresql-client
        state: present

    # ── Docker ────────────────────────────────────────────────────────────────

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add deploy user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Install Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    # ── Node.js ───────────────────────────────────────────────────────────────

    - name: Add NodeSource repository
      shell: curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: yes

    # ── Firewall ──────────────────────────────────────────────────────────────

    - name: Allow SSH
      ufw:
        rule: allow
        port: "22"

    - name: Allow HTTP
      ufw:
        rule: allow
        port: "80"

    - name: Allow HTTPS
      ufw:
        rule: allow
        port: "443"

    - name: Allow API gateway port
      ufw:
        rule: allow
        port: "8080"

    - name: Enable UFW firewall
      ufw:
        state: enabled
        policy: deny

    # ── Nginx ─────────────────────────────────────────────────────────────────

    - name: Start and enable Nginx
      systemd:
        name: nginx
        state: started
        enabled: yes

    - name: Copy Nginx reverse proxy config
      copy:
        src: ../backend/nginx/nginx.conf
        dest: /etc/nginx/sites-available/campustrade
        mode: '0644'

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/campustrade
        dest: /etc/nginx/sites-enabled/campustrade
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded

    - name: Print completion message
      debug:
        msg: "All dependencies installed successfully on {{ inventory_hostname }}"
