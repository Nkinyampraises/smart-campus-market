---
- name: Deploy CampusTrade platform to K3s
  hosts: campustrade
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  vars:
    deployment_mode: full
    image_tag: production
  tasks:
    - name: Validate deployment mode
      ansible.builtin.assert:
        that: deployment_mode in ['data-only', 'full']
        fail_msg: deployment_mode must be data-only or full.

    - name: Inspect forbidden source-tree AI provider file
      ansible.builtin.stat:
        path: "{{ deployment_source }}/backend/ai-provider.env"
        follow: false
      register: source_ai_provider_file

    - name: Refuse an AI provider secret in the synchronized source tree
      ansible.builtin.assert:
        that: not source_ai_provider_file.stat.exists
        fail_msg: >-
          Remove backend/ai-provider.env from the source tree. Production uses
          only {{ deployment_root }}/shared/ai-provider.env.

    - name: Synchronize reviewed source into deployment root
      ansible.builtin.command:
        argv:
          - rsync
          - -a
          - --delete
          - --exclude=.git
          - --exclude=node_modules
          - --exclude=dist
          - --exclude=coverage
          - --exclude=evidence
          - --exclude=backend/.env
          - --exclude=backend/ai-provider.env
          - "{{ deployment_source }}/"
          - "{{ deployment_root }}/current/"
      register: sync_result
      changed_when: sync_result.rc == 0

    - name: Remove any stale source-tree AI provider copy from the release
      ansible.builtin.file:
        path: "{{ deployment_root }}/current/backend/ai-provider.env"
        state: absent

    - name: Grant the Jenkins deployment group access to the release tree
      ansible.builtin.file:
        path: "{{ deployment_root }}/current"
        group: "{{ deployment_group }}"
        mode: g+rwX
        recurse: true

    - name: Inspect canonical protected production environment
      ansible.builtin.stat:
        path: "{{ deployment_root }}/shared/backend.env"
        follow: true
      register: protected_environment

    - name: Require canonical protected production environment
      ansible.builtin.assert:
        that:
          - protected_environment.stat.exists
          - protected_environment.stat.isreg | default(false)
        fail_msg: >-
          The canonical protected environment is missing from
          {{ deployment_root }}/shared/backend.env.

    - name: Protect canonical production environment permissions
      ansible.builtin.file:
        path: "{{ deployment_root }}/shared/backend.env"
        state: file
        owner: "{{ deployment_user }}"
        group: "{{ deployment_group }}"
        mode: '0640'

    - name: Inspect protected AI provider environment
      ansible.builtin.stat:
        path: "{{ deployment_root }}/shared/ai-provider.env"
        follow: true
      register: ai_provider_environment
      when: deployment_mode == 'full'

    - name: Require protected AI provider environment
      ansible.builtin.assert:
        that:
          - ai_provider_environment.stat.exists
          - ai_provider_environment.stat.isreg | default(false)
        fail_msg: >-
          The protected AI provider environment is missing from
          {{ deployment_root }}/shared/ai-provider.env.
      when: deployment_mode == 'full'

    - name: Protect AI provider environment permissions
      ansible.builtin.file:
        path: "{{ deployment_root }}/shared/ai-provider.env"
        state: file
        owner: root
        group: "{{ deployment_group }}"
        mode: '0640'
      when: deployment_mode == 'full'

    - name: Link protected environment into release
      ansible.builtin.file:
        src: "{{ deployment_root }}/shared/backend.env"
        dest: "{{ deployment_root }}/current/backend/.env"
        state: link
        force: true

    - name: Ensure deployment scripts are executable
      ansible.builtin.file:
        path: "{{ deployment_root }}/current/{{ item }}"
        mode: '0750'
      loop:
        - k8s/scripts/build-and-import-images.sh
        - k8s/scripts/deploy.sh
        - k8s/scripts/migrate-and-cutover.sh
        - k8s/scripts/rollback-to-compose.sh
        - k8s/scripts/capture-evidence.sh
        - backend/scripts/smoke-test-running.sh
        - backend/scripts/generate-system-information.sh

    - name: Build and import immutable application images
      ansible.builtin.command: k8s/scripts/build-and-import-images.sh
      args:
        chdir: "{{ deployment_root }}/current"
      environment:
        ENV_FILE: backend/.env
        IMAGE_TAG: "{{ image_tag }}"
      when: deployment_mode == 'full'

    - name: Apply requested Kubernetes deployment mode
      ansible.builtin.command: k8s/scripts/deploy.sh "{{ deployment_mode }}"
      args:
        chdir: "{{ deployment_root }}/current"
      environment:
        ENV_FILE: backend/.env
        AI_ENV_FILE: >-
          {{ (deployment_root + '/shared/ai-provider.env')
             if deployment_mode == 'full' else '' }}
        IMAGE_TAG: "{{ image_tag }}"
      register: deploy_result
      changed_when: true

    - name: Capture deployment status
      ansible.builtin.command: k3s kubectl -n campustrade get pods,svc,ingress,hpa -o wide
      register: status_result
      changed_when: false

    - name: Print deployment status evidence
      ansible.builtin.debug:
        var: status_result.stdout_lines
