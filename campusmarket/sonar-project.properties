sonar.projectKey=campusmarket
sonar.projectName=CampusTrade
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

sonar.sources=frontend/src,backend/services,backend/shared,scripts
sonar.tests=backend/services
sonar.test.inclusions=**/*.test.js,**/tests/**/*.js
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.min.js,frontend/public/**,**/*.test.js,**/tests/**
sonar.coverage.exclusions=frontend/src/main.jsx
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
