version: '3.9'

# CampusTrade DevOps Stack
# Jenkins on :8090  |  SonarQube on :9000
# Start: docker compose up -d
# Stop:  docker compose down

services:

  # ── Jenkins CI/CD ─────────────────────────────────────────────────────────
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: campustrade-jenkins
    restart: unless-stopped
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      # Give Jenkins access to k3s kubeconfig (update server URL via setup script)
      - /etc/rancher/k3s/k3s.yaml:/root/.kube/k3s.yaml:ro
    environment:
      JAVA_OPTS: >-
        -Djenkins.install.runSetupWizard=false
        -Xmx1500m
        -Dhudson.model.DirectoryBrowserSupport.CSP=
      DOCKER_HOST: unix:///var/run/docker.sock
      KUBECONFIG: /root/.kube/k3s.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - sonarqube

  # ── SonarQube (latest community edition) ──────────────────────────────────
  sonarqube:
    image: sonarqube:community
    container_name: campustrade-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar_pass
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: 'true'
      SONAR_SEARCH_JAVAADDITIONALOPTS: '-Dnode.store.allow_mmap=false'
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    depends_on:
      sonar-db:
        condition: service_healthy

  # ── SonarQube PostgreSQL backend ───────────────────────────────────────────
  sonar-db:
    image: postgres:15-alpine
    container_name: campustrade-sonar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar_pass
      POSTGRES_DB: sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonar_db_data:
