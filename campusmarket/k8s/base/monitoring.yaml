apiVersion: v1
kind: ServiceAccount
metadata: { name: prometheus, namespace: campustrade-observability }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: prometheus-data, namespace: campustrade-observability }
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 5Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: campustrade-observability
spec:
  replicas: 1
  # A loopback hostPort can be owned by only one pod per node. Recreate avoids
  # a RollingUpdate deadlock while preserving direct VPS health probes.
  strategy: { type: Recreate }
  selector: { matchLabels: { app.kubernetes.io/name: prometheus } }
  template:
    metadata: { labels: { app.kubernetes.io/name: prometheus, app.kubernetes.io/part-of: campustrade } }
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: prometheus
          image: prom/prometheus:v3.12.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --storage.tsdb.retention.size=5GB
          ports:
            - { name: http, containerPort: 9090, hostPort: 9090, hostIP: 127.0.0.1 }
          readinessProbe: { httpGet: { path: /-/ready, port: http }, initialDelaySeconds: 10, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /-/healthy, port: http }, initialDelaySeconds: 30, periodSeconds: 15 }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus, readOnly: true }
            - { name: data, mountPath: /prometheus }
      volumes:
        - name: config
          projected:
            sources:
              - configMap: { name: prometheus-config }
              - configMap: { name: prometheus-alerts }
        - name: data
          persistentVolumeClaim: { claimName: prometheus-data }
---
apiVersion: v1
kind: Service
metadata: { name: prometheus, namespace: campustrade-observability }
spec:
  selector: { app.kubernetes.io/name: prometheus }
  ports: [{ name: http, port: 9090, targetPort: http }]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: grafana-data, namespace: campustrade-observability }
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 2Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: campustrade-observability
spec:
  replicas: 1
  # A loopback hostPort can be owned by only one pod per node. Recreate avoids
  # a RollingUpdate deadlock while preserving private, tunnel-only access.
  strategy: { type: Recreate }
  selector: { matchLabels: { app.kubernetes.io/name: grafana } }
  template:
    metadata: { labels: { app.kubernetes.io/name: grafana, app.kubernetes.io/part-of: campustrade } }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: grafana
          image: grafana/grafana:13.0.2
          env:
            - { name: GF_SECURITY_ADMIN_USER, valueFrom: { secretKeyRef: { name: campustrade-secrets, key: GRAFANA_USER } } }
            - { name: GF_SECURITY_ADMIN_PASSWORD, valueFrom: { secretKeyRef: { name: campustrade-secrets, key: GRAFANA_PASS } } }
            - { name: GF_USERS_ALLOW_SIGN_UP, value: "false" }
            - { name: GF_SERVER_ROOT_URL, value: "https://grafana.4-168-192-5.sslip.io:80/" }
            - { name: GF_SERVER_DOMAIN, value: "grafana.4-168-192-5.sslip.io" }
            - { name: GF_SERVER_ENABLE_GZIP, value: "true" }
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "false" }
          ports:
            - { name: http, containerPort: 3000, hostPort: 3009, hostIP: 127.0.0.1 }
          readinessProbe: { httpGet: { path: /api/health, port: http }, initialDelaySeconds: 15, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /api/health, port: http }, initialDelaySeconds: 45, periodSeconds: 15 }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - { name: data, mountPath: /var/lib/grafana }
            - { name: datasource, mountPath: /etc/grafana/provisioning/datasources, readOnly: true }
            - { name: dashboard-provider, mountPath: /etc/grafana/provisioning/dashboards, readOnly: true }
            - { name: dashboard, mountPath: /var/lib/grafana/dashboards, readOnly: true }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: grafana-data }
        - name: datasource
          configMap: { name: grafana-datasource }
        - name: dashboard-provider
          configMap: { name: grafana-dashboard-provider }
        - name: dashboard
          configMap: { name: grafana-dashboard }
---
apiVersion: v1
kind: Service
metadata: { name: grafana, namespace: campustrade-observability }
spec:
  selector: { app.kubernetes.io/name: grafana }
  ports: [{ name: http, port: 3000, targetPort: http }]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: campustrade-observability
spec:
  selector: { matchLabels: { app.kubernetes.io/name: node-exporter } }
  template:
    metadata: { labels: { app.kubernetes.io/name: node-exporter, app.kubernetes.io/part-of: campustrade } }
    spec:
      hostPID: true
      containers:
        - name: node-exporter
          image: quay.io/prometheus/node-exporter:v1.11.1
          args:
            - --path.rootfs=/host
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containerd/.+)($$|/)
          ports: [{ name: metrics, containerPort: 9100 }]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
          volumeMounts:
            - { name: root, mountPath: /host, readOnly: true }
      volumes:
        - name: root
          hostPath: { path: /, type: Directory }
---
apiVersion: v1
kind: Service
metadata: { name: node-exporter, namespace: campustrade-observability }
spec:
  selector: { app.kubernetes.io/name: node-exporter }
  ports: [{ name: metrics, port: 9100, targetPort: metrics }]
