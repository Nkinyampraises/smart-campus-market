apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: campustrade
  labels: { app.kubernetes.io/name: api-gateway, app.kubernetes.io/part-of: campustrade }
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels: { app.kubernetes.io/name: api-gateway }
  template:
    metadata:
      labels: { app.kubernetes.io/name: api-gateway, app.kubernetes.io/part-of: campustrade }
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api-gateway
          image: campustrade/api-gateway:production
          imagePullPolicy: Never
          envFrom:
            - secretRef: { name: campustrade-secrets }
            - configMapRef: { name: campustrade-config }
          env:
            - { name: PORT, value: "3000" }
            - { name: SERVICE_NAME, value: "api-gateway" }
          ports:
            - { name: http, containerPort: 3000 }
          startupProbe:
            httpGet: { path: /health, port: http }
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: campustrade
  labels: { app.kubernetes.io/name: api-gateway, app.kubernetes.io/part-of: campustrade }
spec:
  selector: { app.kubernetes.io/name: api-gateway }
  ports:
    - { name: http, port: 3000, targetPort: http }
