global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs: [{ targets: ['localhost:9090'] }]
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs: [{ targets: ['api-gateway.campustrade.svc.cluster.local:3000'] }]
  - job_name: auth-service
    metrics_path: /metrics
    static_configs: [{ targets: ['auth-service.campustrade.svc.cluster.local:3001'] }]
  - job_name: user-service
    metrics_path: /metrics
    static_configs: [{ targets: ['user-service.campustrade.svc.cluster.local:3002'] }]
  - job_name: listing-service
    metrics_path: /metrics
    static_configs: [{ targets: ['listing-service.campustrade.svc.cluster.local:3003'] }]
  - job_name: chat-service
    metrics_path: /metrics
    static_configs: [{ targets: ['chat-service.campustrade.svc.cluster.local:3004'] }]
  - job_name: admin-service
    metrics_path: /metrics
    static_configs: [{ targets: ['admin-service.campustrade.svc.cluster.local:3005'] }]
  - job_name: ai-service
    metrics_path: /metrics
    static_configs: [{ targets: ['ai-service.campustrade.svc.cluster.local:3006'] }]
  - job_name: search-service
    metrics_path: /metrics
    static_configs: [{ targets: ['search-service.campustrade.svc.cluster.local:3007'] }]
  - job_name: notification-service
    metrics_path: /metrics
    static_configs: [{ targets: ['notification-service.campustrade.svc.cluster.local:3008'] }]
  - job_name: node-exporter
    static_configs: [{ targets: ['node-exporter.campustrade-observability.svc.cluster.local:9100'] }]
